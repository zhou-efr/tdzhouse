- name: initialise proxmox
  hosts: localhost
  roles:
    - proxmox

- name: load ct iso to proxmox
  hosts: proxmox
  vars:
    ansible_user: zhou
  tasks:
    - name: Import Debian ct template
      ansible.builtin.get_url:
        url: http://download.proxmox.com/images/system/debian-13-standard_13.1-2_amd64.tar.zst
        dest: /var/lib/vz/template/cache/debian-13-standard_13.1-2_amd64.tar.zst

- name: initialise terraform
  hosts: localhost
  tasks:
    - name: terraform init
      command: terraform init
      args:
        chdir: "../terraform"

- name: Deploy terraform
  hosts: localhost
  vars:
    project_dir: "../terraform"
    vm_storage: "local"
    gate_id: 500
    proxmox_host: "{{ lookup('ansible.builtin.env', 'PROXMOX_HOST') }}"
    proxmox_user: "{{ lookup('ansible.builtin.env', 'PROXMOX_USER') }}"
    proxmox_token_id: "{{ lookup('ansible.builtin.env', 'PROXMOX_TOKEN_ID') }}"
    proxmox_token_secret: "{{ lookup('ansible.builtin.env', 'PROXMOX_TOKEN_SECRET') }}"
    proxmox_node: "{{ lookup('ansible.builtin.env', 'TF_VAR_proxmox_node') }}"
  tasks:
    - name: terraform deploy
      community.general.terraform:
        project_path: "{{ project_dir }}"
        state: present
        complex_vars: true
        variables:
          lxc:
            - name: "dmz-proxy"
              tags: tdz
              id: 501
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "tdz"
              root_disk:
                - size: "5G"
                  storage: "{{ vm_storage }}"
              network:
                - name: "eth0"
                  bridge: "dmz"
                  tag: "20"
                  ipv4: "10.0.2.50/24"
                  gw: "10.0.2.1/24"
          vms:
            - name: core-firewall
              id: "{{ gate_id }}"
              ram: 4096
              cores: 4
              sockets: 1
              os: ""
              tags: "tdz"
              pool: tdz
              vm_state: "stopped"
              disks:
                - size: 10G
                  storage: "{{ vm_storage }}"
                  slot: "scsi0"
              network:
                - id: 0
                  name: "eth0"
                  bridge: "vmbr0"
                  firewall: false
                  macaddr: "02:00:00:8b:21:ea"
                  tag: ""
                - id: 1
                  name: "eth1"
                  bridge: "dmz"
                  firewall: false
                  macaddr: "BC:24:11:C8:B7:51"
                  tag: ""
                - id: 2
                  name: "eth2"
                  bridge: "lan"
                  firewall: false
                  macaddr: "BC:24:11:3C:15:09"
                  tag: ""
            - name: lan-docker
              id: "502"
              ram: 8192
              cores: 4
              sockets: 1
              os: ""
              tags: "tdz"
              pool: tdz
              vm_state: "stopped"
              disks:
#                # ------------Setup disks for whatever you want---------------
#                # Actually might be replaced with add disk with ansible later
#                - size: 10G # recipices
#                  storage: "{{ vm_storage }}"
#                  slot: "scsi24"
#                - size: 10G # Lan documentation - web
#                  storage: "{{ vm_storage }}"
#                  slot: "scsi25"
#                - size: 10G # Fortiglossaire
#                  storage: "{{ vm_storage }}"
#                  slot: "scsi26"
#                - size: 40G # gitlab
#                  storage: "{{ vm_storage }}"
#                  slot: "scsi27"
#                # ----------------------------------------------------------
                - size: 10G # swap
                  storage: "{{ vm_storage }}"
                  slot: "scsi28"
                - size: 1G # Traefik
                  storage: "{{ vm_storage }}"
                  slot: "scsi30"
              network:
                - id: 0
                  name: "eth0"
                  bridge: "lan"
                  firewall: false
                  macaddr: "BC:24:11:AF:9C:B3"
                  tag: "10"

- name: load fortigate to proxmox
  hosts: proxmox
  vars:
    gate_id: 500
    fortigate_ready: "{{ lookup('ansible.builtin.env', 'FORTIGATE_READY') }}"
  tasks:
    - name: copy disk to proxmox
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/fortigate-v4.6.6.qcow2"
        dest: "/tmp/fortigate.qcow2"
      when: fortigate_ready == "NO"
    - name: attach disk to fortigate
      command: "qm importdisk {{ gate_id }} /tmp/fortigate.qcow2 local --target-disk scsi1"
      when: fortigate_ready == "NO"
    - name: change boot order and set mac address
      command: "qm set {{ gate_id }} --boot order=scsi1 -net0 virtio=02:00:00:8b:21:ea,bridge=vmbr0"
      when: fortigate_ready == "NO"
#    - name: stop gate
#      command: "qm stop {{ gate_id }}"
    - name: start gate
      command: "qm start {{ gate_id }}"
      when: fortigate_ready == "NO"

- name: configure docker vm
  hosts: proxmox
  vars:
    vmid: 502
    ansible_user: root
    docker_ready: "{{ lookup('ansible.builtin.env', 'DOCKER_READY') }}"
  tasks:
    - name: Install dep
      ansible.builtin.apt:
        pkg:
          - libguestfs-tools
      when: docker_ready == "NO"
    - name: copy disk to proxmox
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/debian-13-nocloud-amd64.qcow2"
        dest: "/tmp/debian-13.qcow2"
      when: docker_ready == "NO"
    - name: copy ssh public key
      ansible.builtin.copy:
        content: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL6Cg91yjrIRXcytm3pFIXPOPat9I6SF+8MBsRlqCR0A zhou@killians-MacBook-Pro.local"
        dest: "/tmp/authorized_keys"
      when: docker_ready == "NO"
    - name: increase disk size
      shell: "qemu-img resize /tmp/debian-13.qcow2 64G"
      when: docker_ready == "NO"
    - name: duplicate for partition resize
      ansible.builtin.copy:
        src: "/tmp/debian-13.qcow2"
        dest: "/tmp/debian-13-64g.qcow2"
        remote_src: yes
      when: docker_ready == "NO"
    - name: resize partition
      shell: "virt-resize --expand /dev/sda1 /tmp/debian-13.qcow2 /tmp/debian-13-64g.qcow2"
      when: docker_ready == "NO"
    - name: resize partition
      shell: "virt-customize -a /tmp/debian-13-64g.qcow2 \
--hostname 'lan-docker' \
--root-password password:{{ lookup('ansible.builtin.env', 'DOCKER_ROOT_PWD') }} \
--install openssh-server \
--run-command 'systemctl enable ssh' \
--mkdir /root/.ssh \
--upload /tmp/authorized_keys:/root/.ssh/authorized_keys \
--run-command 'chmod 700 /root/.ssh' \
--run-command 'chmod 600 /root/.ssh/authorized_keys'"
      when: docker_ready == "NO"
    - name: attach disk to fortigate
      command: "qm importdisk {{ vmid }} /tmp/debian-13-64g.qcow2 local --target-disk scsi1"
      when: docker_ready == "NO"
    - name: change boot order and set mac address
      command: "qm set {{ vmid }} --boot order=scsi1"
