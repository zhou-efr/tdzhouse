- name: initialise proxmox
  hosts: proxmox
  roles:
    - proxmox

- name: initialise terraform
  hosts: localhost
  tasks:
    - name: terraform init
      command: terraform init
      args:
        chdir: "../terraform"

- name: Deploy terraform
  hosts: localhost
  vars:
    project_dir: "../terraform"
    vm_storage: "local"
    gate_id: 500
    proxmox_host: "{{ lookup('ansible.builtin.env', 'PROXMOX_HOST') }}"
    proxmox_user: "{{ lookup('ansible.builtin.env', 'PROXMOX_USER') }}"
    proxmox_token_id: "{{ lookup('ansible.builtin.env', 'PROXMOX_TOKEN_ID') }}"
    proxmox_token_secret: "{{ lookup('ansible.builtin.env', 'PROXMOX_TOKEN_SECRET') }}"
    proxmox_node: "{{ lookup('ansible.builtin.env', 'TF_VAR_proxmox_node') }}"
  tasks:
    - name: terraform deploy
      community.general.terraform:
        project_path: "{{ project_dir }}"
        state: present
        complex_vars: true
        variables:
          lxc:
            - name: "dmz-proxy"
              id: 501
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "tdz-dmz"
              root_disk:
                - size: "5G"
                  storage: "{{ vm_storage }}"
              network:
                - name: "eth0"
                  bridge: "dmz.20"
                  ipv4: "10.0.2.50/24"
            - name: "lan-k3s-load-balancer"
              id: 502
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "tdz-lan"
              root_disk:
                - size: "5G"
                  storage: "{{ vm_storage }}"
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.49/24"
            - name: "lan-k3s-server-00"
              id: 503
              ram: 2048
              cores: 2
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "tdz-lan"
              root_disk:
                - size: "5G"
                  storage: "{{ vm_storage }}"
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.50/24"
            - name: "lan-k3s-server-01"
              id: 504
              ram: 2048
              cores: 2
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "tdz-lan"
              root_disk:
                - size: "5G"
                  storage: "{{ vm_storage }}"
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.51/24"
            - name: "lan-k3s-00"
              id: 505
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "tdz-lan"
              root_disk:
                - size: "5G"
                  storage: "{{ vm_storage }}"
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.60/24"
            - name: "lan-k3s-01"
              id: 506
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "tdz-lan"
              root_disk:
                - size: "5G"
                  storage: "{{ vm_storage }}"
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.61/24"
            - name: "lan-k3s-02"
              id: 507
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "tdz-lan"
              root_disk:
                - size: "5G"
                  storage: "{{ vm_storage }}"
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.62/24"
          vms:
            - name: core-firewall
              id: "{{ gate_id }}"
              ram: 4096
              cores: 4
              sockets: 1
              os: ""
              pool: tdz-dmz
              vm_state: "stopped"
              disks:
                - size: 10G
                  storage: "{{ vm_storage }}"
                  slot: "scsi0"
              network:
                - id: 0
                  name: "eth0"
                  bridge: "vmbr0"
                  macaddr: 02:00:00:8b:21:ea
                - id: 1
                  name: "eth1"
                  bridge: "dmz"
                  macaddr: ""
                - id: 2
                  name: "eth2"
                  bridge: "lan"
                  macaddr: ""

- name: load disk to proxmox
  hosts: proxmox
  vars:
    gate_id: 500
  tasks:
    - name: copy disk to proxmox
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/fortigate-v4.6.6.qcow2"
        dest: "/tmp/fortigate.qcow2"
    - name: attach disk to fortigate
      command: "qm importdisk {{ gate_id }} /tmp/fortigate.qcow2 local --target-disk scsi1"
    - name: change boot order
      command: "qm set {{ gate_id }} --boot order=scsi1"
    - name: stop gate
      command: "qm stop {{ gate_id }}"
    - name: start gate
      command: "qm start {{ gate_id }}"

