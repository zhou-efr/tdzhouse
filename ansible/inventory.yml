---
all:
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'

  children:
    debian:
      hosts:
        dmz-reverse-proxy:
          ansible_host: 10.0.1.50
        dmz-proxy:
          ansible_host: 10.0.2.50
        proxmox:
          ansible_host: 152.228.227.39

      children:
        lan_k3s:
          hosts:
            lan-k3s-load-balancer:
              ansible_host: 10.1.1.49

          children:
            lan_k3s_servers:
              hosts:
                lan-k3s-server-01:
                  ansible_host: 10.1.1.50

            lan_k3s_nodes:
              hosts:
                lan-k3s-01:
                  ansible_host: 10.1.1.60
                lan-k3s-02:
                  ansible_host: 10.1.1.61

    firewall:
      hosts:
        core-fortigate:
          ansible_host: "{{ lookup('ansible.builtin.env', 'FORTIGATE_IP') }}"
          ansible_connection: httpapi
          ansible_network_os: fortinet.fortios.fortios
          ansible_httpapi_use_ssl: true
          ansible_httpapi_validate_certs: false
          ansible_user: "{{ lookup('ansible.builtin.env', 'FORTIGATE_USR') }}"
          ansible_password: "{{ lookup('ansible.builtin.env', 'FORTIGATE_PWD') }}"
          ansible_httpapi_port: 443
          vdom: "root"