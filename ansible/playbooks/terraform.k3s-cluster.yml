- name: Deploy k3s cluster lxc
  hosts: localhost
  vars:
    dir: "{{ project_dir }}"
  tasks:
    - name: terraform deploy
      community.general.terraform:
        project_path: "{{ dir }}"
        state: present
        complex_vars: true
        variables:
          lxc:
            - name: "lan-k3s-load-balancer"
              id: 502
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "lan"
              root_disk:
                - size: "5G"
                  storage: vm_storage
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.49"

            - name: "lan-k3s-server-00"
              id: 502
              ram: 2048
              cores: 2
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "lan"
              root_disk:
                - size: "5G"
                  storage: vm_storage
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.50"

            - name: "lan-k3s-server-01"
              id: 502
              ram: 2048
              cores: 2
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "lan"
              root_disk:
                - size: "5G"
                  storage: vm_storage
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.51"

            - name: "lan-k3s-00"
              id: 503
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "lan"
              root_disk:
                - size: "5G"
                  storage: vm_storage
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.60"

            - name: "lan-k3s-01"
              id: 504
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "lan"
              root_disk:
                - size: "5G"
                  storage: vm_storage
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.61"

            - name: "lan-k3s-02"
              id: 504
              ram: 1024
              cores: 1
              os: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
              pool: "lan"
              root_disk:
                - size: "5G"
                  storage: vm_storage
              network:
                - name: "eth0"
                  bridge: "lan.10"
                  ipv4: "10.1.1.62"