# -------------------------------------------------------
# 1. Pool d'adresses IP attribuées aux clients (mode-config)
# -------------------------------------------------------
- name: Créer le pool d'IP pour les clients IPsec
  fortios_firewall_address:
    vdom: "{{ vdom }}"
    state: present
    firewall_address:
      name: "{{ vpn_pool_name }}"
      type: iprange
      start_ip: "{{ vpn_pool_start }}"
      end_ip: "{{ vpn_pool_end }}"

# -------------------------------------------------------
# 2. Phase 1 — IKEv2, PSK, FQDN IDs, mode-config ON
# -------------------------------------------------------
- name: Configurer Phase 1 IKEv2
  fortios_vpn_ipsec_phase1_interface:
    vdom: "{{ vdom }}"
    state: present
    vpn_ipsec_phase1_interface:
      name: "{{ phase1_name }}"
      type: dynamic           # remote-access / roadwarrior
      interface: port1
      ike_version: "2"
      authmethod: psk
      psksecret: "{{ psk_secret }}"

      # IDs FQDN pour matcher la config strongSwan
      localid: "{{ fg_fqdn }}"
      localid_type: fqdn
#      peerid: "{{ client_fqdn }}"
      peertype: any           # un seul peer identifié par FQDN : one
      # Si tu veux accepter n'importe quel peer avec le bon PSK :
      # peertype: any

      # Mode-config : le FG attribue une IP au client (vips = 0.0.0.0)
      mode_cfg: enable
      ipv4_start_ip: "{{ vpn_pool_start }}"
      ipv4_end_ip: "{{ vpn_pool_end }}"
      ipv4_netmask: "{{ vpn_pool_mask }}"

      # Split DNS optionnel
      # ipv4_dns_server1: "10.0.1.1"

      # Proposals IKE — compatibles strongSwan défauts
      proposal: "aes256-sha512"
      dhgrp: "21"
      keylife: 86400

      dpd: on-idle
      dpd_retrycount: 3
      dpd_retryinterval: 20

      nattraversal: enable
      transport: "udp"
      ipv4_split_include: "internal-addrs"

# -------------------------------------------------------
# 3. Phase 2 — subnets = remote_ts du côté strongSwan
# -------------------------------------------------------
- name: Configurer Phase 2
  fortios_vpn_ipsec_phase2_interface:
    vdom: "{{ vdom }}"
    state: present
    vpn_ipsec_phase2_interface:
      name: "{{ phase2_name }}"
      phase1name: "{{ phase1_name }}"
      proposal: "aes256-sha512"
      pfs: enable
      dhgrp: "21"
      keylife_type: seconds
      keylifeseconds: 3600
      # Côté FortiGate (local) = les subnets LAN
#      src_addr_type: subnet
#      src_start_ip: "{{ item.src_addr }}"
#      src_end_ip: "255.0.0.0"
      src_addr_type: name
      src_name: "internal-addrs"
      # Côté client (remote) = l'IP assignée dynamiquement
#      dst_addr_type: subnet
#      dst_start_ip: "0.0.0.0"
#      dst_end_ip: "0.0.0.0"
      dst_addr_type: name
      dst_name: "all"
#  loop:
#    - name: "dmz-in"
#      src_addr: "10.0.1.0"
#    - name: "dmz-out"
#      src_addr: "10.0.2.0"
#    - name: "lan-web"
#      src_addr: "10.1.1.0"

