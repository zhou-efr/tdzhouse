# -------------------------------------------------------
# 5. Politique firewall : clients VPN → LANs
# -------------------------------------------------------
- name: Politique firewall VPN → LAN
  fortios_firewall_policy:
    vdom: "{{ vdom }}"
    state: present
    firewall_policy:
      policyid: "20{{ index }}"
      name: "VPN-to-{{ item }}"
      srcintf:
        - name: "{{ phase1_name }}"
      dstintf:
        - name: "{{ item }}"
      srcaddr:
        - name: "vpn-acc-addrs"
      dstaddr:
        - name: "{{ item }}-addrs"
      action: accept
      schedule: always
      service:
        - name: ALL
      logtraffic: all
      nat: disable
  loop:
    - "dmz-in"
    - "dmz-out"
    - "lan-web"
  loop_control:
    index_var: index

