- name: Interface wan
  fortinet.fortios.fortios_system_interface:
    vdom: "root"
    state: "present"
    system_interface:
      name: "port1"
      alias: "wan"
      role: "wan"
      allowaccess:
        - "ssh"
        - "https"

- name: Configure internal interfaces
  fortinet.fortios.fortios_system_interface:
    vdom: "root"
    state: "present"
    access_token: "{{ fortigate_token  }}"
    system_interface:
      name: "{{ item.port }}"
      alias: "{{ item.alias }}"
      mode: "static"
      ip: "{{ item.subnet }}"
      role: "{{ item.role }}"
      allowaccess:
        - "https"
        - "ssh"
        - "ping"
  loop:
    - { port: "port2", role: "dmz", alias: "dmz", subnet: "10.0.0.1/24" }
    - { port: "port3", role: "lan", alias: "lan", subnet: "10.1.0.1/24" }

- name: Ajouter vlans
  fortinet.fortios.fortios_system_interface:
    vdom: "root"
    state: "present"
    access_token: "{{ fortigate_token  }}"
    system_interface:
      vdom: "root"
      name: "{{ item.name }}"
      type: "vlan"
      vlanid: "{{ item.vlanid }}"
      interface: "{{ item.port }}"
      mode: "static"
      ip: "{{ item.subnet }}"
      role: "{{ item.role }}"
      allowaccess: "ping"
  loop:
    - { name: 'dmz-in', port: 'port2', role: "dmz", vlanid: 10, subnet: '10.0.1.1 255.255.255.0' }
    - { name: 'dmz-out', port: 'port2', role: "dmz", vlanid: 20, subnet: '10.0.2.1 255.255.255.0' }
    - { name: 'lan-web', port: 'port3', role: "lan", vlanid: 10, subnet: '10.1.1.1 255.255.255.0' }

- name: Configure DHCP server on VLAN
  fortios_system_dhcp_server:
    vdom: "root"
    state: "present"
    access_token: "{{ fortigate_token  }}"
    system_dhcp_server:
      id: "{{ item.id }}"
      status: "enable"
      interface: "{{ item.name }}"
      lease_time: 86400
      default_gateway: "{{ item.gw }}"
      netmask: "255.255.255.0"
      ip_range:
        - id: 1
          start_ip: "{{ item.base }}.100"
          end_ip: "{{ item.base }}.150"
      dns_service: "local"
      dns_server1: "{{ item.gw }}"
  loop:
    - { id: 12, name: 'lan-web', gw: '10.1.1.1', base: '10.1.1' }

- name: Créer une réservation DHCP (IP fixe par MAC)
  fortios_system_dhcp_server:
    vdom: "{{ vdom }}"
    state: "present"
    access_token: "{{ fortigate_token  }}"
    system_dhcp_server:
      id: 12                          # ID du serveur DHCP lan-web
      reserved_address:
        - id: 1
          mac: "BC:24:11:AF:9C:B3"   # Adresse MAC du client
          ip: "10.1.1.50"          # IP à réserver
          description: "lan-docker"
          action: "reserved"            # assign | block | reserved

- name: Setup aliases
  fortinet.fortios.fortios_firewall_address:
    vdom: "root"
    state: "present"
    access_token: "{{ fortigate_token  }}"
    firewall_address:
      name: "{{ item.name }}"
      type: "ipmask"
      subnet: "{{ item.subnet }}"
  loop:
    - { name: 'reverse-proxy', subnet: "10.0.1.50/32" }
    - { name: 'proxy', subnet: "10.0.2.50/32" }
    - { name: 'lan-docker', subnet: "10.1.1.50/32" }
    - { name: 'l-appart', subnet: "176.187.69.6/32" }
    - { name: 'tour-alto', subnet: "84.14.248.10/32" }
    - { name: 'lan-web-addrs', subnet: "10.1.1.0/24" }
    - { name: 'dmz-in-addrs', subnet: "10.0.1.0/24" }
    - { name: 'dmz-out-addrs', subnet: "10.0.2.0/24" }
    - { name: 'vpn-acc-addrs', subnet: "10.0.3.0/24" }

- name: Create groups
  fortinet.fortios.fortios_firewall_addrgrp:
    vdom: "root"
    state: "present"
    access_token: "{{ fortigate_token  }}"
    firewall_addrgrp:
      name: "{{ item.name }}"
      member: "{{ item.members }}"
  loop:
    - name: "trusted-hosts"
      members:
        - name: "l-appart"
        - name: "tour-alto"
    - name: "internal-addrs"
      members:
        - name: "lan-web-addrs"
        - name: "dmz-in-addrs"
        - name: "dmz-out-addrs"

- name: Policy proxy to internet
  fortinet.fortios.fortios_firewall_policy:
    vdom: "root"
    state: "present"
    access_token: "{{ fortigate_token  }}"
    firewall_policy:
      policyid: 1
      name: "proxy to internet"
      srcintf:
        - name: "dmz-out"
      dstintf:
        - name: "port1"
      srcaddr:
        - name: "proxy"
      dstaddr:
        - name: "all"
      service:
        - name: "HTTP"
        - name: "HTTPS"
        - name: "FTP"
        - name: "DNS"
      schedule: "always"
      action: "accept"
      nat: "enable"
      logtraffic: "all"

- name: all to proxy
  fortinet.fortios.fortios_firewall_policy:
    vdom: "root"
    state: "present"
    access_token: "{{ fortigate_token  }}"
    firewall_policy:
      policyid: "10{{ index }}"
      name: "{{ item }} to proxy"
      srcintf:
        - name: "{{ item }}"
      dstintf:
        - name: "dmz-out"
      srcaddr:
        - name: "{{ item }}-addrs"
      dstaddr:
        - name: "proxy"
      service:
        - name: "HTTP"
      schedule: "always"
      action: "accept"
      nat: "enable"
      logtraffic: "all"
  loop:
    - "dmz-in"
    - "dmz-out"
    - "lan-web"
  loop_control:
    index_var: index

- name: setup vpn access
  include_tasks: ipsec.yml
