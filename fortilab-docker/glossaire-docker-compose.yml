services:
  bookstack:
    image: lscr.io/linuxserver/bookstack:version-v25.12.3
    container_name: bookstack
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - APP_URL="{{ BOOKSTACK_URL }}"
      - APP_KEY="{{ BOOKSTACK_APP_KEY }}"

      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE="{{ BOOKSTACK_DB_NAME }}"
      - DB_USERNAME="{{ BOOKSTACK_DB_USR }}"
      - DB_PASSWORD="{{ BOOKSTACK_DB_PWD }}"
    volumes:
      - /mnt/bookstack/db:/config
    ports:
      - "6875:80"
    restart: unless-stopped
    networks:
      - glossaire-net
      - glossaire-db-net

  mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.8
    container_name: mariadb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC

      - MYSQL_ROOT_PASSWORD="{{ BOOKSTACK_DB_ROOT_PWD }}"
      - MYSQL_DATABASE="{{ BOOKSTACK_DB_NAME }}"
      - MYSQL_USER="{{ BOOKSTACK_DB_USR }}"
      - MYSQL_PASSWORD="{{ BOOKSTACK_DB_PWD }}"
    volumes:
      - /mnt/bookstack/db:/config
    restart: unless-stopped
    networks:
      - glossaire-db-net

networks:
  glossaire-net:
    external: false
  glossaire-db-net:
    external: false
