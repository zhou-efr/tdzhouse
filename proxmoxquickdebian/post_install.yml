- name: start machines
  hosts: localhost
  vars_files:
    - "{{ playbook_dir }}/vars/configuration.yml"
  tasks:
    - name: Start vm
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_token_id: "{{ proxmox_token_id }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        state: started


- name: setup docker
  hosts: target
  vars_files:
    - "{{ playbook_dir }}/vars/configuration.yml"
  roles:
    - ca-client
    - debian
    - docker-server
    - traefik
    - bookstack
