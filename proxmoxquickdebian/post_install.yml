- name: start machines
  hosts: localhost
  vars_files:
    - "{{ playbook_dir }}/vars/configuration.yml"
  tasks:
    - name: Start vm
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_token_id: "{{ proxmox_token_id }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        state: started
    - name: Sleep for 3 minutes to wait ftg to be up
      ansible.builtin.wait_for:
        timeout: 180

- name: setup roles
  hosts: target
  vars_files:
    - "{{ playbook_dir }}/vars/configuration.yml"
  tasks:
    - name: include server roles
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop: "{{ roles }}"
